name: CD Deploy

on:
  workflow_run:
    workflows: ["CI Build"]
    types: [completed]
    branches: [ main, develop ]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - production

env:
  ARTIFACT_NAME: crudburoapi-build

jobs:
  determine-environment:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
    - name: Set environment
      id: set-env
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          echo "environment=${{ github.event.inputs.environment }}" >> $env:GITHUB_OUTPUT
        } elseif ("${{ github.ref }}" -eq "refs/heads/main") {
          echo "environment=staging" >> $env:GITHUB_OUTPUT
        } elseif ("${{ github.ref }}" -eq "refs/heads/develop") {
          echo "environment=dev" >> $env:GITHUB_OUTPUT
        }

  deploy:
    runs-on: windows-latest
    needs: determine-environment
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ./publish

    - name: Deploy to IIS
      uses: deployedore/action-iis-deploy@v1
      with:
        hostname: ${{ secrets.IIS_SERVER }}
        username: ${{ secrets.IIS_USERNAME }}
        password: ${{ secrets.IIS_PASSWORD }}
        website: CrudBuroApi-${{ needs.determine-environment.outputs.environment }}
        package: ./publish/CrudBuroApi
        targethostname: localhost

    - name: Health Check
      run: |
        Start-Sleep -Seconds 30
        $response = Invoke-WebRequest -Uri "http://${{ secrets.IIS_SERVER }}/CrudBuroApi-${{ needs.determine-environment.outputs.environment }}/api/health" -UseBasicParsing
        if ($response.StatusCode -ne 200) { throw "Health check failed" }
        Write-Host "Deployment successful - Health check passed"
