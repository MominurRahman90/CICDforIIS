name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore CrudBuroApi.sln

    - name: Build solution
      run: msbuild CrudBuroApi.sln /p:Configuration=Release /p:DeployOnBuild=true /p:PublishUrl=./publish

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: crudburoapi-build
        path: ./publish
        retention-days: 7
